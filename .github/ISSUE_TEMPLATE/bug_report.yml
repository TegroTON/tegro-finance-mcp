name: Bug report
description: Something doesn't work as documented
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you did, what you expected, what you got.
    validations:
      required: true
  - type: input
    id: tool
    attributes:
      label: Tool / call
      description: Which MCP tool (e.g. tegro_dex_quote_swap) and the arguments.
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: MCP client (Claude Desktop / Cursor / …), OS, Node version, package version.
  - type: checkboxes
    id: nosecrets
    attributes:
      label: Confirm
      options:
        - label: I did not paste any keys, tokens, or secrets in this issue.
          required: true
